name: docmost

x-docmost-image: &docmost-image
  build:
    context: .
    dockerfile: Dockerfile
  image: docmost-local:latest
  pull_policy: never

x-docmost-env: &docmost-env
  APP_URL: "${DOCMOST_APP_URL:-http://localhost:8090}"
  COLLAB_URL: "${DOCMOST_COLLAB_URL:-http://localhost:8090/collab}"
  APP_SECRET: "${DOCMOST_APP_SECRET:-replace-with-a-long-secret-at-least-32-chars}"
  DATABASE_URL: "postgresql://docmost:${DOCMOST_DB_PASSWORD:-STRONG_DB_PASSWORD}@db:5432/docmost?schema=public"
  REDIS_URL: "redis://redis:6379"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
      collab:
        condition: service_healthy
    ports:
      - "${DOCMOST_HTTP_PORT:-8090}:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    <<: *docmost-image
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *docmost-env
      PORT: "3000"
    restart: unless-stopped
    volumes:
      - docmost:/app/data/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  collab:
    image: docmost-local:latest
    pull_policy: never
    depends_on:
      app:
        condition: service_healthy
    environment:
      <<: *docmost-env
      COLLAB_PORT: "3001"
    command: ["pnpm", "collab"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: "${DOCMOST_DB_PASSWORD:-STRONG_DB_PASSWORD}"
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmost -d docmost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  docmost:
  db_data:
  redis_data:
